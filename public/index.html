<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>語学フラッシュカード</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">単語帳<span>FLASHCARD PRO</span></div>
    <div class="nav-item active" onclick="nav('study')"><span>📖</span> 学習</div>
    <div class="nav-item" onclick="nav('quiz')"><span>🎯</span> クイズ</div>
    <div class="nav-item" onclick="nav('words')"><span>📝</span> 単語一覧</div>
    <div class="nav-item" onclick="nav('stats')"><span>📊</span> 統計</div>
    <div class="sidebar-sep"></div>
    <div class="sidebar-label">管理</div>
    <div class="nav-item" onclick="openAdd()"><span>➕</span> 単語を追加</div>
    <div class="nav-item" onclick="nav('io')"><span>📦</span> インポート/エクスポート</div>
  </aside>
  <main class="main">

    <!-- 学習 -->
    <div class="page active" id="page-study">
      <div class="page-header">
        <div class="page-title">フラッシュカード学習</div>
        <div style="display:flex;gap:8px;">
          <select id="studyDeck" onchange="initStudy()" style="width:160px;"></select>
          <button class="btn btn-primary" onclick="initStudy()">シャッフル</button>
        </div>
      </div>
      <div id="study-area"></div>
    </div>

    <!-- クイズ -->
    <div class="page" id="page-quiz">
      <div class="page-header">
        <div class="page-title">クイズモード</div>
        <div style="display:flex;gap:8px;">
          <select id="quizDeck" style="width:160px;"></select>
          <button class="btn btn-primary" onclick="startQuiz()">スタート</button>
        </div>
      </div>
      <div id="quiz-area"><div style="text-align:center;color:var(--text3);padding:4rem;">スタートボタンを押してください</div></div>
    </div>

    <!-- 単語一覧 -->
    <div class="page" id="page-words">
      <div class="page-header">
        <div class="page-title">単語一覧</div>
        <button class="btn btn-primary" onclick="openAdd()">＋ 追加</button>
      </div>
      <div class="search-row">
        <input type="text" id="searchQ" placeholder="検索..." oninput="renderList()">
        <select id="fLang" onchange="renderList()" style="width:120px;">
          <option value="all">全言語</option>
          <option value="en">英語</option>
          <option value="ja">日本語</option>
        </select>
        <select id="fDeck" onchange="renderList()" style="width:160px;"></select>
      </div>
      <div class="card" style="padding:0;overflow:hidden;">
        <table class="word-table">
          <thead><tr><th>単語</th><th>言語</th><th>デッキ</th><th>翻訳</th><th>正答率</th><th></th></tr></thead>
          <tbody id="wordTbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 統計 -->
    <div class="page" id="page-stats">
      <div class="page-header"><div class="page-title">学習統計</div></div>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="card"><div style="font-size:13px;color:var(--text2);margin-bottom:1rem;">デッキ別進捗</div><div id="deckProg"></div></div>
    </div>

    <!-- インポート/エクスポート -->
    <div class="page" id="page-io">
      <div class="page-header"><div class="page-title">インポート / エクスポート</div></div>
      <div class="io-grid">
        <div class="card">
          <div style="font-size:15px;font-weight:500;margin-bottom:8px;">エクスポート</div>
          <div style="font-size:13px;color:var(--text2);margin-bottom:1rem;">全単語データをファイルで保存</div>
          <button class="btn btn-primary" onclick="exportJSON()" style="width:100%;margin-bottom:8px;">JSONをダウンロード</button>
          <button class="btn" onclick="exportCSV()" style="width:100%;">CSVをダウンロード</button>
        </div>
        <div class="card">
          <div style="font-size:15px;font-weight:500;margin-bottom:8px;">インポート</div>
          <div style="font-size:13px;color:var(--text2);margin-bottom:1rem;">JSONまたはCSVを読み込む</div>
          <input type="file" id="importFile" accept=".json,.csv" onchange="doImport(event)">
          <div style="font-size:12px;color:var(--text3);margin-top:1rem;line-height:1.7;">
            CSVフォーマット:<br>
            <code style="color:var(--accent);">単語,言語(ja/en),デッキ名,英語訳,日本語訳,中国語訳,ふりがな,メモ</code>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- スマホ用下部タブバー -->
<nav class="bottom-nav">
  <div class="bottom-nav-item active" onclick="nav('study')" id="bn-study">
    <span class="bn-icon">📖</span><span>学習</span>
  </div>
  <div class="bottom-nav-item" onclick="nav('quiz')" id="bn-quiz">
    <span class="bn-icon">🎯</span><span>クイズ</span>
  </div>
  <div class="bottom-nav-item" onclick="openAdd()" id="bn-add">
    <span class="bn-icon">➕</span><span>追加</span>
  </div>
  <div class="bottom-nav-item" onclick="nav('words')" id="bn-words">
    <span class="bn-icon">📝</span><span>単語</span>
  </div>
  <div class="bottom-nav-item" onclick="nav('stats')" id="bn-stats">
    <span class="bn-icon">📊</span><span>統計</span>
  </div>
</nav>

<!-- 単語追加/編集モーダル -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">単語を追加</div>
    <div class="form-group">
      <label>単語 *</label>
      <input type="text" id="fw" placeholder="apple / りんご" oninput="onWordInput()">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>言語</label>
        <select id="fl" onchange="onLangChange()">
          <option value="en">英語 (English)</option>
          <option value="ja">日本語</option>
        </select>
      </div>
      <div class="form-group">
        <label>デッキ名</label>
        <input type="text" id="fd" placeholder="例: 食べ物" list="deckDL">
        <datalist id="deckDL"></datalist>
      </div>
    </div>
    <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:1rem;margin-bottom:1rem;">
      <div style="font-size:12px;color:var(--text3);margin-bottom:0.75rem;display:flex;align-items:center;gap:6px;">
        <span id="transSpin" class="spin-sm" style="display:none;"></span>
        自動翻訳
      </div>
      <div class="form-row" id="transFields"></div>
      <div class="form-group" id="furiGroup" style="display:none;">
        <label>ひらがな（ふりがな）</label>
        <input type="text" id="ffuri" placeholder="例: りんご">
      </div>
    </div>
    <div class="form-group">
      <label>メモ（任意）</label>
      <input type="text" id="fmemo" placeholder="例文・補足など">
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeAdd()">キャンセル</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveWord()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/storage.js"></script>
<script src="/js/translate.js"></script>
<script src="/js/image.js"></script>
<script src="/js/study.js"></script>
<script src="/js/quiz.js"></script>
<script src="/js/words.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/io.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
